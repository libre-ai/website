name: Context hygiene

# Blocks private identifiers and machine-local paths from entering the public
# tree. Deny patterns are stored base64-encoded so this workflow never carries
# them in human-readable form (obfuscation, not encryption: the goal is zero
# readable mention, plus grep-proof compliance of the tree). Text files only
# (-I): identifiers embedded in binary files would escape these checks. Lines
# carrying the 'allow-local-path' marker are exempt from the path check.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  context-hygiene:
    name: No private identifiers or machine-local paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Banned private identifiers (hard fail)
        run: |
          set -euo pipefail
          banned="$(printf '%s' 'W2Rdb3hhbGxpYQ==' | base64 -d)"
          if git grep -I -n -i -E -e "$banned" -- .; then
            echo "::error::Banned private identifier found in tracked files."
            exit 1
          fi
          echo "OK: no banned identifier in tracked files."

      - name: Machine-local identifiers and paths (hard fail)
        run: |
          set -euo pipefail
          generic='/Users/[A-Za-z0-9._-]+' # allow-local-path (pattern definition)
          user_pat="$(printf '%s' 'W2ldZmk2NTY3' | base64 -d)"
          hits="$(git grep -I -n -E -e "$generic" -e "$user_pat" -- . \
            | grep -v 'allow-local-path' || true)"
          if [ -n "$hits" ]; then
            printf '%s\n' "$hits"
            echo "::error::Machine-local identifier or path found in tracked files."
            exit 1
          fi
          echo "OK: no machine-local identifier or path in tracked files."

      - name: Symlink targets (hard fail)
        run: |
          set -euo pipefail
          banned="$(printf '%s' 'W2Rdb3hhbGxpYQ==' | base64 -d)"
          user_pat="$(printf '%s' 'W2ldZmk2NTY3' | base64 -d)"
          hits=""
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            t="$(readlink "$f" || true)"
            if printf '%s' "$t" | grep -qiE -e "$banned" -e "$user_pat" -e '/Users/'; then
              hits="${hits}${f} -> ${t} ; "
            fi
          done < <(git ls-files -s | awk -F'\t' '$1 ~ /^120000/ {print $2}')
          if [ -n "$hits" ]; then
            printf '%s\n' "$hits"
            echo "::error::Symlink target carries a machine-local or private identifier."
            exit 1
          fi
          echo "OK: no offending symlink target."
